version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: osys-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: osys_audit
      MYSQL_USER: osys
      MYSQL_PASSWORD: osys123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # RabbitMQ 消息队列
  rabbitmq:
    image: rabbitmq:3.10-management
    container_name: osys-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"    # AMQP 端口
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "status"]
      timeout: 20s
      retries: 10

  # Redis（可选，用于缓存）
  redis:
    image: redis:7-alpine
    container_name: osys-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  mysql_data:
  rabbitmq_data:
  redis_data:
